services:
  backend:
    build:
      context: ./backend
    env_file:
      - .env
    ports:
      - "8000:8000"
    volumes:
      - ./backend/storage:/app/storage
      - ./campusmind.db:/app/campusmind.db
    environment:
      CHROMA_HOST: chroma
      CHROMA_PORT: 8000
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      - chroma

  frontend:
    build:
      context: ./frontend
    environment:
      NEXT_PUBLIC_API_BASE_URL: http://localhost:8000
    ports:
      - "3000:3000"
    depends_on:
      - backend

  ollama:
    image: ollama/ollama:latest
    profiles:
      - local-ai
    ports:
      - "11434:11434"
    volumes:
      - ollama:/root/.ollama

  chroma:
    image: chromadb/chroma:0.5.23
    ports:
      - "8001:8000"
    volumes:
      - chroma:/chroma/chroma

volumes:
  ollama:
  chroma:
